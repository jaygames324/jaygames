<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps - Lumousa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      background: #1a1a1a;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      border-bottom: 3px solid #333;
    }
    .container {
      padding: 40px 20px;
      text-align: center;
    }
    .app-card {
      display: inline-block;
      background: #1f1f1f;
      border-radius: 12px;
      padding: 30px 20px;
      margin: 15px;
      width: 320px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .app-card:hover {
      transform: scale(1.08);
      background: #2a2a2a;
    }
    .app-card h2 {
      font-size: 26px;
      margin: 15px 0 8px;
    }
    .app-card p {
      color: #aaa;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: none;
    }
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #333;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1001;
      font-size: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">Lumousa Apps - Unblocked</div>

  <div class="container" id="appsPage">
    <h1 style="margin-bottom: 40px;">Quick Access</h1>

    <!-- Proxy Card -->
    <div class="app-card" onclick="loadProxy()">
      <h2>🔗 Proxy</h2>
      <p>Browse any website</p>
    </div>

    <!-- You can add more cards below easily -->
    <!-- Example:
    <div class="app-card" onclick="loadSite('https://www.youtube.com')">
      <h2>▶️ YouTube</h2>
      <p>Videos</p>
    </div>
    -->

  </div>

  <div class="back-btn" id="backBtn" onclick="goBack()">← Back to Apps</div>

  <iframe id="proxyFrame" allowfullscreen allow="fullscreen; clipboard-write; encrypted-media"></iframe>

  <script>
    const proxyBase = "https://scramjet.mercurywork.shop/";

    function loadProxy() {
      document.getElementById('appsPage').style.display = 'none';
      document.getElementById('backBtn').style.display = 'block';

      const frame = document.getElementById('proxyFrame');
      frame.src = proxyBase;        // Opens the clean Scramjet homepage
      frame.style.display = 'block';
    }

    // Optional: Add this if you want direct loading for other sites later
    function loadSite(url) {
      document.getElementById('appsPage').style.display = 'none';
      document.getElementById('backBtn').style.display = 'block';
      const frame = document.getElementById('proxyFrame');
      frame.src = proxyBase + encodeURIComponent(url);
      frame.style.display = 'block';
    }

    function goBack() {
      const frame = document.getElementById('proxyFrame');
      frame.style.display = 'none';
      frame.src = '';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('appsPage').style.display = 'block';
    }
  </script>

</body>
</html>
